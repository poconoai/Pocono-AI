<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocono AI, LLC</title>
    <style>
        /* General Reset & Body Styles */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Deep black background */
            color: #ffffff; /* White text for contrast */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }

        /* Header containing the Logo */
        header {
            padding: 30px 50px;
            background-color: #0a0a0a; /* Slightly offset black for depth */
            border-bottom: 1px solid #222222;
            text-align: center; 
        }

        /* The low-code logo integration */
        .site-logo {
            max-width: 250px;
            height: auto;
            display: inline-block;
        }

        /* Main Content Container */
        main {
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
        }

        /* CEO Profile Section */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 50px;
            padding: 20px;
        }

        .profile-image {
            width: 100%;
            max-width: 350px;
        }

        .profile-info h1 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 2.5rem;
            color: #ffffff;
        }

        .profile-info h2 {
            font-size: 1.2rem;
            color: #aaaaaa; /* Professional grey for the title */
            margin-bottom: 25px;
            font-weight: 400;
        }
        
        .profile-info p {
            font-size: 1.1rem;
            color: #cccccc;
        }

        /* Responsive Design for Mobile Devices */
        @media (max-width: 768px) {
            .profile-section {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" alt="Pocono AI, LLC Logo" class="site-logo">
    </header>

    <main>
        <section class="profile-section">
            <img src="hero.jpg" alt="Marcus Brett O'Dell" class="profile-image">
            
            <div class="profile-info">
                <h1>Marcus Brett O'Dell</h1>
                <h2>Founder, CEO, and Chief Technologist | Pocono AI, LLC</h2>
                <p>
                    Delivering secure, on-premises artificial intelligence and data solutions. Specializing in advanced Retrieval-Augmented Generation (RAG) and local AI system optimization for medical and legal practices.
                </p>
            </div>
        </section>
    </main>

</body>
</html>
