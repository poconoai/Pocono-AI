<div class="roi-calculator" id="roi-calculator">
        <div class="roi-title">3-Year Cost & Cash Flow Deliberation</div>
        <div class="roi-grid">
            <div class="roi-inputs">
                <div class="roi-input-group">
                    <label>Providers (Nodes) <span id="val-providers">3</span></label>
                    <input type="range" id="inp-providers" min="1" max="10" value="3" step="1">
                </div>
                <div class="roi-input-group">
                    <label>Status Quo Cost (Cloud/Scribe per mo) <span id="val-sq">$1,500</span></label>
                    <input type="range" id="inp-sq" min="0" max="3000" value="1500" step="100">
                </div>
                <div class="roi-input-group">
                    <label>EHR/Auth Hours Saved per Day <span id="val-hours">2.0</span></label>
                    <input type="range" id="inp-hours" min="0" max="5.9" value="2.0" step="0.1">
                </div>
                <div class="roi-input-group">
                    <label>Provider Value per Hour <span id="val-rate">$150</span></label>
                    <input type="range" id="inp-rate" min="50" max="500" value="150" step="10">
                </div>
            </div>
            <div class="roi-outputs">
                <div class="roi-output-card sq">
                    <div class="roi-out-label">Status Quo (3-Yr TCO)</div>
                    <div class="roi-out-val" id="out-sq">$162,000</div>
                </div>
                <div class="roi-output-card capex">
                    <div class="roi-out-label">CapEx Model (3-Yr TCO)</div>
                    <div class="roi-out-val" id="out-capex">$70,197</div>
                </div>
                <div class="roi-output-card haas">
                    <div class="roi-out-label">HaaS Model (3-Yr TCO)</div>
                    <div class="roi-out-val haas-val" id="out-haas">$102,600</div>
                </div>
                <div class="roi-time-val">
                    <label>Estimated Value of Time Saved (3-Yr)</label>
                    <span id="out-time-val">$648,000</span>
                </div>
            </div>
        </div>
    </div>
